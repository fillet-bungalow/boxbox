name: Generate BTCC 2026 ICS

on:
  schedule:
    # Runs daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch: # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 icalendar pytz

      - name: Run scraper
        run: python generate.py

      - name: name: Commit & push if changed
        run: |
          git config user.name "boxbox-bot"
          git config user.email "boxbox-bot@users.noreply.github.com"
          git fetch origin main
          git checkout origin/main -- .
          git add boxbox.ics
          git diff --staged --quiet || git commit -m "chore: refresh BoxBox calendar [$(date -u +%Y-%m-%d)]"
          git push
